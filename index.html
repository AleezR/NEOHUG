<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeoHug - Smart KMC Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1 id="appTitle">NeoHug - Smart KMC Monitoring Platform</h1>

    <div class="controls">
        <button onclick="Theme.toggle()">🌓</button>
        <button onclick="Language.toggle()">🌐</button>
    </div>
</header>

<main>

<section class="card">
    <h2 data-key="enterVitals">Enter Baby Vitals</h2>

    <div class="input-group">
        <label data-key="temperature">Temperature (°C)</label>
        <input type="number" id="temperature" step="0.1">
    </div>

    <div class="input-group">
        <label data-key="respiration">Respiration Rate (breaths/min)</label>
        <input type="number" id="respiration">
    </div>

    <div class="input-group">
        <label data-key="spo2">SpO₂ (%) - Optional</label>
        <input type="number" id="spo2">
    </div>

    <button onclick="App.submitVitals()" data-key="submit">Submit</button>
</section>

<section class="card center">
    <h2 data-key="currentStatus">Current Status</h2>
    <div id="statusIndicator" class="status green">Stable</div>
    <p id="riskMessage"></p>
</section>

<section class="card center">
    <h2 data-key="kmcTracker">KMC Session Tracker</h2>
    <div id="timerDisplay">00:00:00</div>
    <div>
        <button onclick="Timer.start()" data-key="start">Start</button>
        <button onclick="Timer.stop()" data-key="stop">Stop</button>
        <button onclick="Timer.reset()" data-key="reset">Reset</button>
    </div>
</section>

<section class="card">
    <h2 data-key="temperatureTrend">Temperature Trend</h2>
    <canvas id="temperatureChart"></canvas>
</section>

<section class="card">
    <h2 data-key="alertHistory">Alert History</h2>
    <ul id="alertLog"></ul>
</section>

</main>

<script defer src="js/riskEngine.js"></script>
<script defer src="js/timer.js"></script>
<script defer src="js/translations.js"></script>
<script defer src="js/app.js"></script>

</body>
</html>
